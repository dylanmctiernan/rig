# SOPS configuration for mac.lab infrastructure
# Uses age encryption with two keys:
# 1. Personal age key (stored in ~/.config/sops/age/keys.txt on your workstation)
# 2. Recovery age key (stored in Bitwarden for emergency access)

keys:
  # Personal age key - already on your system
  - &personal age1fzrthms7a20xu8s05p8904tneet5xzeh4jkkq724q0mxz9wtau0s3gwfga
  # Recovery age key - store in Bitwarden
  - &recovery age1ssppr4cq5dxqa2fyg2d3ke2yud2dgrvv6js50l7ves0hznx353ts4ak02j

creation_rules:
  # Centralized configuration file
  - path_regex: config\.yaml$
    key_groups:
      - age:
          - *personal
          - *recovery
